services:
  dwpostgres:
    image: postgres:17rc1-alpine3.19
    restart: unless-stopped
    container_name: dwpronto_postgres
    env_file: ./.env
    ports:
      - "5434:5432"
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    networks:
      - airflow

  webserver:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: ./.env
    ports:
      - "8081:8080"
    environment:
      - _PIP_ADDITIONAL_REQUIREMENTS=oracledb==1.1.0
      - POSTGRES_HOST=dwpostgres
    volumes:
      - ./dags:/usr/local/airflow/dags
      - ./dbt_prontocardio:/usr/local/airflow/dbt
      - ./dbt_dw_entradas:/usr/local/airflow/dbt
      - ./dbt_dw_repasse:/usr/local/airflow/dbt
      - ./include/oracle:/usr/local/airflow/.oracle/instantclient_19_23/
      - ./include/postgresql:/usr/local/airflow/.postgresql/data/instantclient_17_0/
      - ./script_ingestao:/usr/local/airflow/script_ingestao
      - ./.dlt:/usr/local/airflow/.dlt
    depends_on:
      - dwpostgres
    networks:
      - airflow
    healthcheck:
      test: ["CMD", "curl", "http://localhost:8080/health"]
      interval: 30s
      timeout: 30s
      retries: 5

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./script_ingestao:/usr/local/airflow/script_ingestao
      - ./.dlt:/usr/local/airflow/.dlt
      - ./dbt_dw_entradas:/usr/local/airflow/dbt
      - ./dbt_dw_repasse:/usr/local/airflow/dbt
    depends_on:
      - dwpostgres
    networks:
      - airflow

  triggerer:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./script_ingestao:/usr/local/airflow/script_ingestao
      - ./.dlt:/usr/local/airflow/.dlt
      - ./dbt_dw_entradas:/usr/local/airflow/dbt
      - ./dbt_dw_repasse:/usr/local/airflow/dbt
    depends_on:
      - dwpostgres
    networks:
      - airflow

volumes:
  postgres-volume:

networks:
  airflow:
    name: airflow
    driver: bridge
    external: false